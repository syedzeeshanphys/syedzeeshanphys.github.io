<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syed Noorulla — Physics & Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --text: #eeeae2;
      --muted: #9b97a0;
      --accent: #d4845a;
      --border: rgba(255,255,255,0.08);
      --card-bg: rgba(255,255,255,0.04);
      --glass: rgba(7,7,15,0.72);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      font-size: 17px;
      overflow-x: hidden;
    }

    /* ── STARFIELD ── */
    #universe {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* nebula glow layers */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 30%, rgba(90,40,140,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(30,80,160,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 55% at 60% 10%, rgba(180,60,80,0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    /* page content sits above canvas */
    nav, header, section, footer { position: relative; z-index: 2; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,7,15,0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 5vw;
    }
    .nav-name {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    header {
      max-width: 720px;
      margin: 0 auto;
      padding: 8rem 5vw 6rem;
    }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      font-weight: 500;
    }
    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      color: #f5f0e8;
    }
    h1 em { color: var(--accent); font-style: italic; }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 540px;
      line-height: 1.85;
    }
    .hero-sub strong { color: #d8d3cc; font-weight: 400; }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 2.8rem 0 0;
      opacity: 0.6;
    }

    /* ── SECTIONS ── */
    section {
      max-width: 720px;
      margin: 0 auto;
      padding: 5rem 5vw;
      border-top: 1px solid var(--border);
    }
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 2rem;
    }
    h2 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.6rem;
      line-height: 1.2;
      color: #f5f0e8;
    }

    /* ── ABOUT ── */
    .about-body p {
      color: var(--muted);
      margin-bottom: 1.1rem;
      font-size: 1rem;
    }
    .about-body p strong {
      color: #d8d3cc;
      font-weight: 500;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 2rem;
    }
    .pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 0.28rem 1rem;
      font-size: 0.81rem;
      color: var(--muted);
    }

    /* ── BLOG CARDS ── */
    .blogs-grid { display: flex; flex-direction: column; }
    .blog-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 1rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .blog-card:first-child { border-top: 1px solid var(--border); }
    .blog-card:hover { opacity: 0.65; }
    .card-topic {
      font-size: 0.69rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.45rem;
      font-weight: 500;
    }
    .card-title {
      font-family: 'Lora', serif;
      font-size: 1.08rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.4rem;
      color: #ede8df;
    }
    .card-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .card-arrow {
      font-size: 1.1rem;
      color: var(--muted);
      padding-top: 0.15rem;
      transition: transform 0.2s, color 0.2s;
    }
    .blog-card:hover .card-arrow { transform: translateX(5px); color: var(--accent); }

    /* ── CONTACT ── */
    .contact-row {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .contact-row a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: color 0.2s;
    }
    .contact-row a:hover { color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 5vw;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    header   { animation: fadeUp 0.8s ease both; }
    section  { animation: fadeUp 0.8s ease both; }
    section:nth-of-type(1) { animation-delay: 0.12s; }
    section:nth-of-type(2) { animation-delay: 0.22s; }
    section:nth-of-type(3) { animation-delay: 0.32s; }

    /* shooting stars are drawn on canvas now */
  </style>
</head>
<body>

  <canvas id="universe"></canvas>

  <nav>
    <a class="nav-name" href="#">Syed Noorulla</a>
